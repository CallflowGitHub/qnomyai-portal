name: Log Traffic

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 06:00 UTC
  workflow_dispatch:       # allows manual trigger from Actions tab

permissions:
  contents: write          # needed to commit traffic-log.json

jobs:
  log-traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch traffic data from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/traffic/views \
            --jq '.views' > /tmp/new_entries.json

      - name: Merge into traffic-log.json
        run: |
          LOG=traffic-log.json
          if [ ! -f "$LOG" ]; then echo "[]" > "$LOG"; fi
          # Merge existing log with new entries; deduplicate by timestamp (prefer latest fetch)
          jq -s '
            (.[0] + .[1]) |
            group_by(.timestamp) |
            map(last) |
            sort_by(.timestamp)
          ' "$LOG" /tmp/new_entries.json > /tmp/merged.json
          mv /tmp/merged.json "$LOG"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic-log.json
          git diff --cached --quiet || git commit -m "chore: log traffic $(date -u +%Y-%m-%d)"
          git push
